workspace=1,monitor:HDMI-A-1

##### CODE OSS #####
windowrule {
  name = windowrule-1
  center = on
  match:class = ^(Electron)$
}


##### VS-CODE #####
windowrule {
  name = windowrule-2
  center = on
  match:class = Code
}


##### FIREFOX #####

windowrule {
  name = windowrule-3
  size = (monitor_w*0.6)
  match:class = firefox
  match:title = ^(Envio de arquivos)$
}

windowrule {
  name = windowrule-4
  float = on
  match:class = firefox
  match:title = Picture-in-Picture
}

windowrule {
  name = windowrule-5
  float = on
  match:title = ^(About Mozilla Firefox)$
}

windowrule {
  name = windowrule-6
  float = on
  match:class = ^(firefox)$
  match:title = ^(Picture-in-Picture)$
}

windowrule {
  name = windowrule-7
  float = on
  match:class = ^(firefox)$
  match:title = ^(Library)$
}


##### THUNAR #####
windowrule {
  name = windowrule-8
  float = on
  center = on
  opacity = 0.80
  match:class = ^(thunar)$
}

windowrule {
  name = windowrule-9
  float = on
  size = (monitor_w*0.9) (monitor_h*0.8)
  match:class = ^(thunar)$
  match:initial_title = lacum - Thunar
}

windowrule {
  name = windowrule-10
  float = on
  match:class = ^(thunar)$
  match:initial_title = Progresso da operação de arquivo
}


##### SPOTIFY #####
windowrule {
  name = windowrule-11
  float = on
  size = (monitor_w*0.86)
  center = on
  match:class = ^(Spotify)$
}


##### STEAM #####
#windowrulev2 = float, class:steam
windowrule {
  name = windowrule-12
  center = on
  match:class = ^(steam)$
  match:title = Steam
}

windowrule {
  name = windowrule-13
  center = on
  float = on
  match:class = steam
  match:title = Special Offers
}

windowrule {
  name = windowrule-14
  center = on
  float = on
  match:class = steam
  match:title = Sign in to Steam
}


##### DISCORD #####
windowrule {
  name = windowrule-15
  center = on
  match:class = discord
}

windowrule {
  name = windowrule-16
  opacity = 0.90 0.90
  match:class = ^(discord)$
}


##### ROFI #####
windowrule {
  name = windowrule-17
  center = on
  match:class = ^(Rofi)$
}

#windowrulev2 = size 70%, class:Rofi, title:^(rofi - 󰣇)

windowrule {
  name = windowrule-18
  rounding = 0
  match:class = Rofi
  match:title = rofi - dmenu
}

windowrule {
  name = windowrule-19
  no_blur = on
  match:class = Rofi
}



##### PAVUCONTROL #####
windowrule {
  name = windowrule-20
  float = on
  size = (monitor_w*0.6)
  match:class = org.pulseaudio.pavucontrol
}


##### GNOME CALCULATOR #####
windowrule {
  name = windowrule-21
  float = on
  center = on
  match:class = ^(org.gnome.Calculator)$
}


##### GNOME CALENDAR #####
windowrule {
  name = windowrule-22
  float = on
  match:class = ^(org.gnome.Calendar)
}


##### OBS-STUDIO #####
#windowrulev2 = float,class:^(com.obsproject.Studio)
#windowrulev2 = center,class:^(com.obsproject.Studio)

##### GEDIT #####
windowrule {
  name = windowrule-23
  float = on
  size = (monitor_w*0.5) (monitor_h*0.7)
  center = on
  match:class = ^(org.gnome.gedit)
}


##### LOUPE #####
windowrule {
  name = windowrule-24
  float = on
  size = (monitor_w*0.8)
  match:class = org.gnome.Loupe
}


##### BTOP #####
windowrule {
  name = windowrule-25
  float = on
  match:class = kitty
  match:title = btop
  match:initial_class = kitty
  match:initial_title = kitty
}


##### NWG-LOOK #####
windowrule {
  name = windowrule-26
  float = on
  match:class = nwg-look
}


##### VIRT-MANAGER #####
windowrule {
  name = virt-manager
  float = on
  center = on
  size = (monitor_w*0.5) (monitor_h*0.7)
  match:class = virt-manager  
}


windowrule {
  name = windowrule-27
  float = on
  match:class = hyprland-share-picker
}

windowrule {
  name = windowrule-28
  size = (monitor_w*0.6)
  match:class = hyprland-share-picker
}



# Ignore maximize requests from apps. You'll probably like this.
windowrule {
  name = windowrule-29
  suppress_event = maximize
  match:class = .*
}


# Fix some dragging issues with XWayland
windowrule {
  name = windowrule-30
  no_focus = on
  match:class = ^$
  match:title = ^$
  match:xwayland = 1
  match:float = 1
  match:fullscreen = 0
  match:pin = 0
}


# ====== Layer-Rules ====== #
layerrule {
  name = layerrule-1
  blur = on
  ignore_alpha = 0
  match:namespace = rofi
}

layerrule = blur on, match:namespace logout_dialog
layerrule = blur on, match:namespace  gtk-layer-shell
layerrule = blur on, match:namespace swaync-control-center
layerrule = blur on, match:namespace swaync-notification-window 
layerrule = ignore_alpha 0, match:namespace swaync-control-center
layerrule = ignore_alpha 0, match:namespace swaync-notification-window
layerrule = ignore_alpha 0.5, match:namespace swaync-control-center
layerrule = ignore_alpha 0.5, match:namespace swaync-notification-window
